name: Mirror to Organization Repo

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch: # Allow manual triggering

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: Sync with organization repo
        env:
          TARGET_REPO: Trailblaizedevelopment/trailblaize-web-app
          TOKEN: ${{ secrets.ORG_REPO_TOKEN }}
        run: |
          # Remove remote if it already exists to avoid errors
          git remote remove org-mirror 2>/dev/null || true
          
          # Add the organization repo as a remote
          git remote add org-mirror https://x-access-token:${TOKEN}@github.com/${TARGET_REPO}.git
          
          # Fetch from organization repo to check for changes
          git fetch org-mirror main develop || true
          git fetch org-mirror develop || true
          
          # Get current branch name
          CURRENT_BRANCH=${GITHUB_REF#refs/heads/}
          
          # Push current branch to organization repo
          git push org-mirror ${CURRENT_BRANCH} --force
          
          # Optionally, pull and merge changes from org repo if they exist
          # This ensures bidirectional sync
          if git ls-remote --heads org-mirror ${CURRENT_BRANCH} | grep -q ${CURRENT_BRANCH}; then
            echo "Branch ${CURRENT_BRANCH} exists in org repo, checking for updates..."
            # Note: We push first, then would need to handle conflicts if org has changes
            # For now, we're doing one-way sync (dev repo -> org repo)
            # To enable bidirectional sync, you'd need merge logic here
          fi