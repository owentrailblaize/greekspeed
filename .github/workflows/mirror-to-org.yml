name: Mirror to Organization Repo

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch: # Allow manual triggering

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: Sync with organization repo
        env:
          TARGET_REPO: Trailblaizedevelopment/trailblaize-web-app
          TOKEN: ${{ secrets.ORG_REPO_TOKEN }}
        run: |
          # Remove remote if it already exists to avoid errors
          git remote remove org-mirror 2>/dev/null || true
          
          # Add the organization repo as a remote
          git remote add org-mirror https://x-access-token:${TOKEN}@github.com/${TARGET_REPO}.git
          
          # Fetch from organization repo to check for changes
          git fetch org-mirror main develop || true
          
          # Get current branch name
          CURRENT_BRANCH=${GITHUB_REF#refs/heads/}
          
          # Remove workflow files from the index before pushing
          # This prevents workflow files from being synced (they're repo-specific)
          git rm -r --cached .github/workflows/ 2>/dev/null || true
          
          # Stage all other changes
          git add -A
          
          # Commit the removal of workflow files if they were removed
          if ! git diff --cached --quiet; then
            git commit -m "chore: exclude workflow files from sync" || true
          fi
          
          # Push current branch to organization repo (excluding workflow files)
          git push org-mirror ${CURRENT_BRANCH} --force
          
          # Restore workflow files in the local repo
          git checkout HEAD -- .github/workflows/ 2>/dev/null || true