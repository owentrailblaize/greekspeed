name: Mirror to Organization Repo

on:
  push:
    branches:
      - main
      - develop

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: Debug - Check if token exists
        run: |
          if [ -z "${{ secrets.ORG_REPO_TOKEN }}" ]; then
            echo "ERROR: ORG_REPO_TOKEN secret is not set or is empty"
            exit 1
          else
            echo "Token is set (length: ${#TOKEN})"
          fi
        env:
          TOKEN: ${{ secrets.ORG_REPO_TOKEN }}

      - name: Push to organization repo
        env:
          TARGET_REPO: Trailblaizedevelopment/trailblaize-web-app
          TOKEN: ${{ secrets.ORG_REPO_TOKEN }}
        run: |
          git remote add org-mirror https://x-access-token:${TOKEN}@github.com/${TARGET_REPO}.git
          git push org-mirror ${{ github.ref }} --force